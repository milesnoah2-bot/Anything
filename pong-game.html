<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            font-family: 'Arial', sans-serif;
        }

        .container {
            text-align: center;
        }

        h1 {
            color: white;
            margin-bottom: 20px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        canvas {
            background-color: #000;
            border: 3px solid #fff;
            display: block;
            margin: 0 auto;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .scoreboard {
            color: white;
            font-size: 2em;
            margin-top: 20px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .player-score {
            color: #00ff00;
            display: inline-block;
            margin-right: 50px;
        }

        .computer-score {
            color: #ff0000;
            display: inline-block;
        }

        .instructions {
            color: white;
            margin-top: 20px;
            font-size: 0.9em;
            opacity: 0.8;
        }

        .instructions p {
            margin: 5px 0;
        }

        .disaster-info {
            color: #ffff00;
            margin-top: 10px;
            font-size: 0.85em;
            min-height: 60px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 PONG GAME 🎮</h1>
        <canvas id="pongCanvas" width="800" height="400"></canvas>
        <div class="scoreboard">
            <div class="player-score">Player (Left): <span id="playerScore">0</span></div>
            <div class="computer-score">Computer (Right): <span id="computerScore">0</span></div>
        </div>
        <div class="instructions">
            <p><strong>Controls:</strong> Use Mouse Y-position or Arrow Keys UP/DOWN to move your paddle</p>
            <p>First to 11 points wins!</p>
        </div>
        <div class="disaster-info" id="disasterInfo">Natural disasters incoming! Avoid tornadoes 🌪️, earthquakes 🌍, fire 🔥, and tsunamis 🌊</div>
    </div>

    <script>
        const canvas = document.getElementById('pongCanvas');
        const ctx = canvas.getContext('2d');
        const disasterInfo = document.getElementById('disasterInfo');

        // Game objects
        const paddleWidth = 10;
        const paddleHeight = 80;
        const ballSize = 8;

        // Player paddle (left side)
        const playerPaddle = {
            x: 10,
            y: canvas.height / 2 - paddleHeight / 2,
            width: paddleWidth,
            height: paddleHeight,
            dy: 0,
            speed: 6,
            stunned: 0,
            shaking: 0,
            shakingIntensity: 0
        };

        // Computer paddle (right side)
        const computerPaddle = {
            x: canvas.width - paddleWidth - 10,
            y: canvas.height / 2 - paddleHeight / 2,
            width: paddleWidth,
            height: paddleHeight,
            speed: 5,
            stunned: 0,
            shaking: 0,
            shakingIntensity: 0
        };

        // Ball
        const ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            dx: 5,
            dy: 5,
            size: ballSize,
            speed: 5,
            onFire: false,
            slowedDuration: 0
        };

        // Disasters array
        let disasters = [];
        let tsunamiActive = false;
        let tsunamiSlowDuration = 0;

        // Score
        let playerScore = 0;
        let computerScore = 0;

        // Keyboard input
        const keys = {};
        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;
        });
        window.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        // Mouse input
        document.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseY = e.clientY - rect.top;
            if (playerPaddle.stunned <= 0) {
                playerPaddle.y = mouseY - paddleHeight / 2;
            }
        });

        // Constrain paddle to canvas
        function constrainPaddle(paddle) {
            if (paddle.y < 0) {
                paddle.y = 0;
            }
            if (paddle.y + paddle.height > canvas.height) {
                paddle.y = canvas.height - paddle.height;
            }
        }

        // Update player paddle position with keyboard
        function updatePlayerPaddle() {
            if (playerPaddle.stunned > 0) {
                playerPaddle.stunned--;
                return;
            }

            if (keys['ArrowUp'] || keys['w']) {
                playerPaddle.y -= playerPaddle.speed;
            }
            if (keys['ArrowDown'] || keys['s']) {
                playerPaddle.y += playerPaddle.speed;
            }
            constrainPaddle(playerPaddle);
        }

        // Update computer paddle (AI)
        function updateComputerPaddle() {
            if (computerPaddle.stunned > 0) {
                computerPaddle.stunned--;
                return;
            }

            const computerCenter = computerPaddle.y + paddleHeight / 2;
            const ballCenter = ball.y;

            // Simple AI: move towards the ball
            if (computerCenter < ballCenter - 35) {
                computerPaddle.y += computerPaddle.speed;
            } else if (computerCenter > ballCenter + 35) {
                computerPaddle.y -= computerPaddle.speed;
            }

            constrainPaddle(computerPaddle);
        }

        // Update ball position
        function updateBall() {
            let speedMultiplier = 1;
            if (ball.slowedDuration > 0) {
                speedMultiplier = 0.4;
                ball.slowedDuration--;
            }

            ball.x += ball.dx * speedMultiplier;
            ball.y += ball.dy * speedMultiplier;

            // Ball collision with top and bottom walls
            if (ball.y - ball.size < 0 || ball.y + ball.size > canvas.height) {
                ball.dy = -ball.dy;
                ball.y = Math.max(ball.size, Math.min(canvas.height - ball.size, ball.y));
            }

            // Ball collision with left and right walls (scoring)
            if (ball.x - ball.size < 0) {
                computerScore++;
                resetBall();
            }
            if (ball.x + ball.size > canvas.width) {
                playerScore++;
                resetBall();
            }

            // Ball collision with player paddle
            if (
                ball.x - ball.size < playerPaddle.x + playerPaddle.width &&
                ball.y > playerPaddle.y &&
                ball.y < playerPaddle.y + playerPaddle.height
            ) {
                if (ball.onFire) {
                    // Fire ball - don't hit it, get stunned instead
                    playerPaddle.stunned = 120;
                    disasterInfo.textContent = "🔥 Player hit fire ball! STUNNED for 2 seconds!";
                    ball.onFire = false;
                } else {
                    ball.dx = -ball.dx;
                    ball.x = playerPaddle.x + playerPaddle.width + ball.size;
                    ball.dy += (ball.y - (playerPaddle.y + paddleHeight / 2)) * 0.1;
                }
            }

            // Ball collision with computer paddle
            if (
                ball.x + ball.size > computerPaddle.x &&
                ball.y > computerPaddle.y &&
                ball.y < computerPaddle.y + computerPaddle.height
            ) {
                if (ball.onFire) {
                    // Fire ball - don't hit it, get stunned instead
                    computerPaddle.stunned = 120;
                    disasterInfo.textContent = "🔥 Computer hit fire ball! STUNNED for 2 seconds!";
                    ball.onFire = false;
                } else {
                    ball.dx = -ball.dx;
                    ball.x = computerPaddle.x - ball.size;
                    ball.dy += (ball.y - (computerPaddle.y + paddleHeight / 2)) * 0.1;
                }
            }

            // Cap ball speed
            const maxSpeed = 8;
            if (Math.abs(ball.dx) > maxSpeed) {
                ball.dx = (ball.dx / Math.abs(ball.dx)) * maxSpeed;
            }
            if (Math.abs(ball.dy) > maxSpeed) {
                ball.dy = (ball.dy / Math.abs(ball.dy)) * maxSpeed;
            }
        }

        // Reset ball to center
        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.dx = (Math.random() > 0.5 ? 1 : -1) * 5;
            ball.dy = (Math.random() - 0.5) * 8;
            ball.onFire = false;

            // Update score display
            document.getElementById('playerScore').textContent = playerScore;
            document.getElementById('computerScore').textContent = computerScore;

            disasterInfo.textContent = '';
        }

        // Disaster system
        class Tornado {
            constructor(x) {
                this.x = x;
                this.y = Math.random() * (canvas.height - 80) + 40;
                this.width = 30;
                this.height = 80;
                this.vx = x < canvas.width / 2 ? 2 : -2;
                this.rotation = 0;
                this.life = 300;
            }

            update() {
                this.x += this.vx;
                this.rotation += 0.3;
                this.life--;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.fillStyle = 'rgba(100, 150, 255, 0.6)';
                ctx.fillRect(-this.width / 2, -this.height / 2, this.width, this.height);
                ctx.restore();
            }

            checkPaddleCollision(paddle) {
                return (
                    this.x > paddle.x - this.width / 2 &&
                    this.x < paddle.x + paddle.width + this.width / 2 &&
                    this.y > paddle.y - this.height / 2 &&
                    this.y < paddle.y + paddle.height + this.height / 2
                );
            }

            checkBallCollision(ball) {
                return (
                    Math.abs(this.x - ball.x) < this.width / 2 + ball.size &&
                    Math.abs(this.y - ball.y) < this.height / 2 + ball.size
                );
            }
        }

        class Fire {
            constructor() {
                this.duration = 200;
                this.active = true;
            }

            update() {
                this.duration--;
                if (this.duration <= 0) {
                    this.active = false;
                    ball.onFire = false;
                }
            }

            draw() {
                if (ball.onFire) {
                    ctx.fillStyle = '#ff6600';
                    ctx.beginPath();
                    ctx.arc(ball.x, ball.y, ball.size + 5, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        class Earthquake {
            constructor() {
                this.duration = 150;
                this.intensity = 1;
            }

            update() {
                this.duration--;
                if (this.duration <= 0) {
                    this.intensity = 0;
                }
            }

            applyShake(paddle) {
                if (this.intensity > 0) {
                    paddle.shaking = Math.sin(this.duration * 0.3) * 15 * this.intensity;
                    paddle.shakingIntensity = this.intensity;
                }
            }
        }

        class Tsunami {
            constructor() {
                this.duration = 240;
            }

            update() {
                this.duration--;
                if (this.duration <= 0) {
                    tsunamiActive = false;
                    tsunamiSlowDuration = 0;
                    disasterInfo.textContent = '🌊 Tsunami passed!';
                }
            }

            draw() {
                ctx.fillStyle = 'rgba(30, 144, 255, 0.3)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.strokeStyle = 'rgba(30, 144, 255, 0.6)';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(canvas.width / 2, canvas.height / 2, 150 - this.duration / 2, 0, Math.PI * 2);
                ctx.stroke();
            }
        }

        let currentEarthquake = null;
        let currentFire = null;
        let currentTsunami = null;

        // Spawn natural disasters randomly
        function spawnDisaster() {
            const rand = Math.random();
            if (rand < 0.25) {
                // Tornado
                disasters.push(new Tornado(Math.random() < 0.5 ? 100 : canvas.width - 100));
                disasterInfo.textContent = '🌪️ Tornado incoming!';
            } else if (rand < 0.5) {
                // Earthquake
                currentEarthquake = new Earthquake();
                disasterInfo.textContent = '🌍 Earthquake strikes!';
            } else if (rand < 0.75) {
                // Fire
                ball.onFire = true;
                currentFire = new Fire();
                disasterInfo.textContent = '🔥 Ball on fire! Avoid it!';
            } else {
                // Tsunami
                tsunamiActive = true;
                tsunamiSlowDuration = 240;
                currentTsunami = new Tsunami();
                ball.slowedDuration = 240;
                disasterInfo.textContent = '🌊 Tsunami! Everything slows down!';
            }
        }

        // Update all disasters
        function updateDisasters() {
            // Tornadoes
            disasters = disasters.filter(t => t.life > 0);
            disasters.forEach(tornado => {
                tornado.update();

                // Check collision with paddles
                if (tornado.checkPaddleCollision(playerPaddle)) {
                    playerPaddle.stunned = 120;
                    disasterInfo.textContent = '🌪️ Player hit by tornado! STUNNED!';
                }
                if (tornado.checkPaddleCollision(computerPaddle)) {
                    computerPaddle.stunned = 120;
                    disasterInfo.textContent = '🌪️ Computer hit by tornado! STUNNED!';
                }

                // Tornado affects ball trajectory
                if (tornado.checkBallCollision(ball)) {
                    ball.dx += (Math.random() - 0.5) * 4;
                    ball.dy += (Math.random() - 0.5) * 4;
                }
            });

            // Earthquake
            if (currentEarthquake) {
                currentEarthquake.update();
                currentEarthquake.applyShake(playerPaddle);
                currentEarthquake.applyShake(computerPaddle);
            }

            // Fire
            if (currentFire) {
                currentFire.update();
            }

            // Tsunami
            if (currentTsunami) {
                currentTsunami.update();
            }
        }

        // Draw functions
        function drawPaddle(paddle) {
            ctx.save();
            if (paddle.shaking) {
                ctx.translate(paddle.shaking, 0);
            }
            ctx.fillStyle = paddle.stunned > 0 ? '#ff6600' : '#fff';
            ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);
            ctx.restore();
        }

        function drawBall() {
            ctx.fillStyle = ball.onFire ? '#ff6600' : '#fff';
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.size, 0, Math.PI * 2);
            ctx.fill();

            if (ball.onFire) {
                ctx.strokeStyle = '#ffaa00';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(ball.x, ball.y, ball.size + 3, 0, Math.PI * 2);
                ctx.stroke();
            }
        }

        function drawCenter() {
            ctx.strokeStyle = '#fff';
            ctx.setLineDash([5, 10]);
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        function draw() {
            // Clear canvas
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw game elements
            drawCenter();
            drawPaddle(playerPaddle);
            drawPaddle(computerPaddle);
            drawBall();

            // Draw disasters
            disasters.forEach(tornado => tornado.draw());
            if (currentFire) currentFire.draw();
            if (currentTsunami) currentTsunami.draw();
        }

        // Main game loop
        let gameFrames = 0;
        function gameLoop() {
            updatePlayerPaddle();
            updateComputerPaddle();
            updateBall();
            updateDisasters();

            gameFrames++;
            if (gameFrames % 300 === 0) {
                spawnDisaster();
            }

            draw();
            requestAnimationFrame(gameLoop);
        }

        // Start game
        gameLoop();
    </script>
</body>
</html>
