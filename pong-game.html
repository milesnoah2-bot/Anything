<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            font-family: 'Arial', sans-serif;
        }

        .container {
            text-align: center;
        }

        h1 {
            color: white;
            margin-bottom: 20px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        canvas {
            background-color: #000;
            border: 3px solid #fff;
            display: block;
            margin: 0 auto;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .scoreboard {
            color: white;
            font-size: 2em;
            margin-top: 20px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .player-score {
            color: #00ff00;
            display: inline-block;
            margin-right: 50px;
        }

        .computer-score {
            color: #ff0000;
            display: inline-block;
        }

        .instructions {
            color: white;
            margin-top: 20px;
            font-size: 0.9em;
            opacity: 0.8;
        }

        .instructions p {
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 PONG GAME 🎮</h1>
        <canvas id="pongCanvas" width="800" height="400"></canvas>
        <div class="scoreboard">
            <div class="player-score">Player (Left): <span id="playerScore">0</span></div>
            <div class="computer-score">Computer (Right): <span id="computerScore">0</span></div>
        </div>
        <div class="instructions">
            <p><strong>Controls:</strong> Use Mouse Y-position or Arrow Keys UP/DOWN to move your paddle</p>
            <p>First to 11 points wins!</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('pongCanvas');
        const ctx = canvas.getContext('2d');

        // Game objects
        const paddleWidth = 10;
        const paddleHeight = 80;
        const ballSize = 8;

        // Player paddle (left side)
        const playerPaddle = {
            x: 10,
            y: canvas.height / 2 - paddleHeight / 2,
            width: paddleWidth,
            height: paddleHeight,
            dy: 0,
            speed: 6
        };

        // Computer paddle (right side)
        const computerPaddle = {
            x: canvas.width - paddleWidth - 10,
            y: canvas.height / 2 - paddleHeight / 2,
            width: paddleWidth,
            height: paddleHeight,
            speed: 5
        };

        // Ball
        const ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            dx: 5,
            dy: 5,
            size: ballSize,
            speed: 5
        };

        // Score
        let playerScore = 0;
        let computerScore = 0;

        // Keyboard input
        const keys = {};
        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;
        });
        window.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        // Mouse input
        document.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseY = e.clientY - rect.top;
            playerPaddle.y = mouseY - paddleHeight / 2;
        });

        // Constrain paddle to canvas
        function constrainPaddle(paddle) {
            if (paddle.y < 0) {
                paddle.y = 0;
            }
            if (paddle.y + paddle.height > canvas.height) {
                paddle.y = canvas.height - paddle.height;
            }
        }

        // Update player paddle position with keyboard
        function updatePlayerPaddle() {
            if (keys['ArrowUp'] || keys['w']) {
                playerPaddle.y -= playerPaddle.speed;
            }
            if (keys['ArrowDown'] || keys['s']) {
                playerPaddle.y += playerPaddle.speed;
            }
            constrainPaddle(playerPaddle);
        }

        // Update computer paddle (AI)
        function updateComputerPaddle() {
            const computerCenter = computerPaddle.y + paddleHeight / 2;
            const ballCenter = ball.y;

            // Simple AI: move towards the ball
            if (computerCenter < ballCenter - 35) {
                computerPaddle.y += computerPaddle.speed;
            } else if (computerCenter > ballCenter + 35) {
                computerPaddle.y -= computerPaddle.speed;
            }

            constrainPaddle(computerPaddle);
        }

        // Update ball position
        function updateBall() {
            ball.x += ball.dx;
            ball.y += ball.dy;

            // Ball collision with top and bottom walls
            if (ball.y - ball.size < 0 || ball.y + ball.size > canvas.height) {
                ball.dy = -ball.dy;
                ball.y = Math.max(ball.size, Math.min(canvas.height - ball.size, ball.y));
            }

            // Ball collision with left and right walls (scoring)
            if (ball.x - ball.size < 0) {
                computerScore++;
                resetBall();
            }
            if (ball.x + ball.size > canvas.width) {
                playerScore++;
                resetBall();
            }

            // Ball collision with player paddle
            if (
                ball.x - ball.size < playerPaddle.x + playerPaddle.width &&
                ball.y > playerPaddle.y &&
                ball.y < playerPaddle.y + playerPaddle.height
            ) {
                ball.dx = -ball.dx;
                ball.x = playerPaddle.x + playerPaddle.width + ball.size;
                // Add spin based on where ball hits paddle
                ball.dy += (ball.y - (playerPaddle.y + paddleHeight / 2)) * 0.1;
            }

            // Ball collision with computer paddle
            if (
                ball.x + ball.size > computerPaddle.x &&
                ball.y > computerPaddle.y &&
                ball.y < computerPaddle.y + computerPaddle.height
            ) {
                ball.dx = -ball.dx;
                ball.x = computerPaddle.x - ball.size;
                // Add spin based on where ball hits paddle
                ball.dy += (ball.y - (computerPaddle.y + paddleHeight / 2)) * 0.1;
            }

            // Cap ball speed
            const maxSpeed = 8;
            if (Math.abs(ball.dx) > maxSpeed) {
                ball.dx = (ball.dx / Math.abs(ball.dx)) * maxSpeed;
            }
            if (Math.abs(ball.dy) > maxSpeed) {
                ball.dy = (ball.dy / Math.abs(ball.dy)) * maxSpeed;
            }
        }

        // Reset ball to center
        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.dx = (Math.random() > 0.5 ? 1 : -1) * 5;
            ball.dy = (Math.random() - 0.5) * 8;

            // Update score display
            document.getElementById('playerScore').textContent = playerScore;
            document.getElementById('computerScore').textContent = computerScore;
        }

        // Draw functions
        function drawPaddle(paddle) {
            ctx.fillStyle = '#fff';
            ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);
        }

        function drawBall() {
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.size, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawCenter() {
            ctx.strokeStyle = '#fff';
            ctx.setLineDash([5, 10]);
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        function draw() {
            // Clear canvas
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw game elements
            drawCenter();
            drawPaddle(playerPaddle);
            drawPaddle(computerPaddle);
            drawBall();
        }

        // Main game loop
        function gameLoop() {
            updatePlayerPaddle();
            updateComputerPaddle();
            updateBall();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Start game
        gameLoop();
    </script>
</body>
</html>
