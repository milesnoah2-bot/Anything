<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Pong Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            font-family: 'Arial', sans-serif;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 90vw;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: white;
            margin-bottom: 15px;
            font-size: clamp(1.5em, 5vw, 2.5em);
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        canvas {
            background-color: #000;
            border: 3px solid #fff;
            display: block;
            max-width: 100%;
            height: auto;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            touch-action: none;
        }

        .scoreboard {
            color: white;
            font-size: clamp(1em, 4vw, 2em);
            margin-top: 15px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .player-score {
            color: #00ff00;
        }

        .computer-score {
            color: #ff0000;
        }

        .instructions {
            color: white;
            margin-top: 15px;
            font-size: clamp(0.7em, 2.5vw, 0.9em);
            opacity: 0.8;
        }

        .instructions p {
            margin: 5px 0;
        }

        .disaster-info {
            color: #ffff00;
            margin-top: 10px;
            font-size: clamp(0.75em, 2vw, 0.85em);
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .skip-button {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background-color: rgba(255, 255, 255, 0.3);
            color: white;
            border: 2px solid white;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            display: none;
            z-index: 1000;
        }

        .skip-button:hover {
            background-color: rgba(255, 255, 255, 0.5);
        }

        @media (max-width: 768px) {
            .container {
                padding: 5px;
            }

            .scoreboard {
                font-size: 1.2em;
                gap: 15px;
            }

            .instructions p {
                font-size: 0.75em;
            }

            .skip-button {
                padding: 8px 15px;
                font-size: 12px;
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes scaleIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
    <button class="skip-button" id="skipButton">SKIP →</button>
    <div class="container">
        <h1>🎮 PONG GAME 🎮</h1>
        <canvas id="pongCanvas"></canvas>
        <div class="scoreboard">
            <div class="player-score">Player: <span id="playerScore">0</span></div>
            <div class="computer-score">Computer: <span id="computerScore">0</span></div>
        </div>
        <div class="instructions">
            <p><strong>Desktop:</strong> Mouse or Arrow Keys UP/DOWN</p>
            <p><strong>Mobile:</strong> Tap & drag up/down</p>
            <p>First to 11 points wins!</p>
        </div>
        <div class="disaster-info" id="disasterInfo">Natural disasters incoming! Avoid tornadoes 🌪️, earthquakes 🌍, fire 🔥, and tsunamis 🌊</div>
    </div>

    <script>
        const canvas = document.getElementById('pongCanvas');
        const ctx = canvas.getContext('2d');
        const disasterInfo = document.getElementById('disasterInfo');
        const skipButton = document.getElementById('skipButton');

        // Game states
        const GAME_STATE = {
            CUTSCENE: 'cutscene',
            PLAYING: 'playing'
        };

        let gameState = GAME_STATE.CUTSCENE;
        let cutsceneTime = 0;

        // Web Audio API for sound effects
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();

        function playBeep(frequency, duration) {
            try {
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                oscillator.frequency.value = frequency;
                oscillator.type = 'sine';
                
                gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
                
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + duration);
            } catch (e) {
                // Audio context error - silently continue
            }
        }

        // Responsive canvas sizing
        function resizeCanvas() {
            const maxWidth = Math.min(window.innerWidth - 20, 800);
            const maxHeight = Math.min(window.innerHeight - 280, 400);
            const ratio = 2;
            
            if (maxWidth / ratio <= maxHeight) {
                canvas.width = maxWidth;
                canvas.height = maxWidth / ratio;
            } else {
                canvas.height = maxHeight;
                canvas.width = maxHeight * ratio;
            }
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('orientationchange', () => {
            setTimeout(resizeCanvas, 100);
        });

        // Draw monster
        function drawMonster(x, y, scale, opacity) {
            ctx.save();
            ctx.globalAlpha = opacity;
            ctx.translate(x, y);
            ctx.scale(scale, scale);

            // Body (large circle)
            ctx.fillStyle = '#8B008B';
            ctx.beginPath();
            ctx.arc(0, 0, 40, 0, Math.PI * 2);
            ctx.fill();

            // Eyes
            ctx.fillStyle = '#FF4500';
            ctx.beginPath();
            ctx.arc(-15, -15, 12, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(15, -15, 12, 0, Math.PI * 2);
            ctx.fill();

            // Pupils
            ctx.fillStyle = '#000000';
            ctx.beginPath();
            ctx.arc(-15, -15, 6, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(15, -15, 6, 0, Math.PI * 2);
            ctx.fill();

            // Mouth (evil grin)
            ctx.strokeStyle = '#FF4500';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(0, 5, 15, 0.2, Math.PI - 0.2);
            ctx.stroke();

            // Teeth
            ctx.strokeStyle = '#FFFFFF';
            ctx.lineWidth = 1;
            for (let i = -15; i <= 15; i += 6) {
                ctx.beginPath();
                ctx.moveTo(i, 5);
                ctx.lineTo(i, 15);
                ctx.stroke();
            }

            // Horns
            ctx.strokeStyle = '#8B008B';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(-25, -40);
            ctx.lineTo(-35, -60);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(25, -40);
            ctx.lineTo(35, -60);
            ctx.stroke();

            // Spikes on body
            ctx.fillStyle = '#FF4500';
            for (let angle = 0; angle < Math.PI * 2; angle += Math.PI / 4) {
                const sx = Math.cos(angle) * 45;
                const sy = Math.sin(angle) * 45;
                ctx.beginPath();
                ctx.arc(sx, sy, 5, 0, Math.PI * 2);
                ctx.fill();
            }

            ctx.restore();
        }

        // Cutscene drawing functions
        function drawCutscene() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Stage 0: Dark intro with text (0-60)
            if (cutsceneTime < 60) {
                const stageProgress = cutsceneTime / 60;
                ctx.fillStyle = `rgba(255, 0, 0, ${stageProgress * 0.2})`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.globalAlpha = Math.sin(stageProgress * Math.PI) * 0.7;
                ctx.font = 'bold 24px Arial';
                ctx.fillStyle = '#FF4500';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('A creature awakens...', canvas.width / 2, canvas.height / 2);
            }

            // Stage 1: Monster appears (60-150)
            if (cutsceneTime >= 60 && cutsceneTime < 150) {
                const stageProgress = (cutsceneTime - 60) / 90;
                ctx.fillStyle = `rgba(255, 0, 0, ${0.1 + stageProgress * 0.2})`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                const scale = 0.2 + stageProgress * 0.8;
                const opacity = Math.min(1, stageProgress * 2);
                const monsterY = canvas.height / 2 + Math.sin(stageProgress * Math.PI) * 30;
                
                drawMonster(canvas.width / 2, monsterY, scale, opacity);

                playBeep(200 + stageProgress * 300, 0.05);
            }

            // Stage 2: Monster roars (150-210)
            if (cutsceneTime >= 150 && cutsceneTime < 210) {
                const stageProgress = (cutsceneTime - 150) / 60;
                ctx.fillStyle = `rgba(255, 0, 0, ${0.3})`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                const shakeX = (Math.random() - 0.5) * 20 * (1 - stageProgress);
                const shakeY = (Math.random() - 0.5) * 20 * (1 - stageProgress);
                drawMonster(canvas.width / 2 + shakeX, canvas.height / 2 + shakeY, 1, 1);

                // Roar effect
                ctx.globalAlpha = 1 - stageProgress;
                ctx.strokeStyle = '#FF4500';
                ctx.lineWidth = 3;
                for (let i = 0; i < 3; i++) {
                    ctx.beginPath();
                    ctx.arc(canvas.width / 2, canvas.height / 2, 60 + i * 30 + stageProgress * 80, 0, Math.PI * 2);
                    ctx.stroke();
                }

                playBeep(150, 0.1);
            }

            // Stage 3: Evil laugh with message (210-330)
            if (cutsceneTime >= 210 && cutsceneTime < 330) {
                const stageProgress = (cutsceneTime - 210) / 120;
                ctx.fillStyle = `rgba(255, 0, 0, ${0.2})`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                const bobY = Math.sin(cutsceneTime * 0.1) * 10;
                drawMonster(canvas.width / 2, canvas.height / 2.5 + bobY, 1, 1);

                // Speech bubble
                ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
                ctx.fillRect(canvas.width / 2 - 150, canvas.height * 0.65, 300, 80);
                ctx.strokeStyle = '#FF4500';
                ctx.lineWidth = 2;
                ctx.strokeRect(canvas.width / 2 - 150, canvas.height * 0.65, 300, 80);

                ctx.font = 'bold 18px Arial';
                ctx.fillStyle = '#FF4500';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                const messages = [
                    'YOU ARE MINE NOW!',
                    'TRAPPED IN MY GAME!',
                    'SURVIVE THE CHAOS!'
                ];
                const messageIndex = Math.floor(stageProgress * 3) % 3;
                ctx.fillText(messages[messageIndex], canvas.width / 2, canvas.height * 0.7);

                playBeep(100 + Math.sin(cutsceneTime * 0.1) * 100, 0.05);
            }

            // Stage 4: The challenge begins (330-420)
            if (cutsceneTime >= 330 && cutsceneTime < 420) {
                const stageProgress = (cutsceneTime - 330) / 90;
                ctx.fillStyle = `rgba(255, 0, 0, ${0.2 * (1 - stageProgress)})`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                const scale = 1 + stageProgress * 0.5;
                const opacity = 1 - stageProgress;
                drawMonster(canvas.width / 2, canvas.height / 2.5, scale, opacity);

                ctx.globalAlpha = Math.sin(stageProgress * Math.PI) * 0.8;
                ctx.font = 'bold 20px Arial';
                ctx.fillStyle = '#FFFFFF';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('BATTLE FOR YOUR FREEDOM!', canvas.width / 2, canvas.height * 0.2);

                ctx.font = 'bold 16px Arial';
                ctx.fillStyle = '#00FF00';
                ctx.fillText('Face the natural disasters...', canvas.width / 2, canvas.height * 0.85);
            }

            // Stage 5: Final countdown (420-480)
            if (cutsceneTime >= 420) {
                const stageProgress = (cutsceneTime - 420) / 60;
                const remaining = Math.ceil(3 * (1 - stageProgress));

                ctx.font = `bold ${80}px Arial`;
                ctx.fillStyle = remaining <= 1 ? '#00FF00' : '#FFFF00';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowColor = '#FFFFFF';
                ctx.shadowBlur = 30;
                
                if (remaining > 0) {
                    ctx.fillText(remaining, canvas.width / 2, canvas.height / 2);
                    playBeep(1000 + remaining * 200, 0.1);
                } else {
                    ctx.fillStyle = '#00FF00';
                    ctx.fillText('LET\'S GO!', canvas.width / 2, canvas.height / 2);
                    playBeep(1500, 0.15);
                }
            }
        }

        // Game objects
        const paddleWidth = 10;
        const paddleHeight = 80;
        const ballSize = 8;

        const playerPaddle = {
            x: 10,
            y: canvas.height / 2 - paddleHeight / 2,
            width: paddleWidth,
            height: paddleHeight,
            dy: 0,
            speed: 6,
            stunned: 0,
            shaking: 0,
            shakingIntensity: 0,
            targetY: canvas.height / 2 - paddleHeight / 2
        };

        const computerPaddle = {
            x: canvas.width - paddleWidth - 10,
            y: canvas.height / 2 - paddleHeight / 2,
            width: paddleWidth,
            height: paddleHeight,
            speed: 5,
            stunned: 0,
            shaking: 0,
            shakingIntensity: 0
        };

        const ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            dx: 5,
            dy: 5,
            size: ballSize,
            speed: 5,
            onFire: false,
            slowedDuration: 0
        };

        let disasters = [];
        let tsunamiActive = false;
        let tsunamiSlowDuration = 0;

        let playerScore = 0;
        let computerScore = 0;

        const keys = {};
        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;
        });
        window.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        let touchStartY = 0;
        let touchEndY = 0;

        canvas.addEventListener('touchstart', (e) => {
            const rect = canvas.getBoundingClientRect();
            touchStartY = e.touches[0].clientY - rect.top;
            playerPaddle.targetY = touchStartY - paddleHeight / 2;
        }, false);

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touchY = e.touches[0].clientY - rect.top;
            playerPaddle.targetY = touchY - paddleHeight / 2;
        }, false);

        document.addEventListener('mousemove', (e) => {
            if (!canvas.getBoundingClientRect) return;
            const rect = canvas.getBoundingClientRect();
            const mouseY = e.clientY - rect.top;
            if (mouseY >= 0 && mouseY <= canvas.height) {
                playerPaddle.targetY = mouseY - paddleHeight / 2;
            }
        });

        function constrainPaddle(paddle) {
            if (paddle.y < 0) {
                paddle.y = 0;
            }
            if (paddle.y + paddle.height > canvas.height) {
                paddle.y = canvas.height - paddle.height;
            }
        }

        function updatePlayerPaddle() {
            if (playerPaddle.stunned > 0) {
                playerPaddle.stunned--;
                return;
            }

            if (playerPaddle.targetY !== undefined) {
                const diff = playerPaddle.targetY - playerPaddle.y;
                playerPaddle.y += diff * 0.3;
            }

            if (keys['ArrowUp'] || keys['w']) {
                playerPaddle.y -= playerPaddle.speed;
            }
            if (keys['ArrowDown'] || keys['s']) {
                playerPaddle.y += playerPaddle.speed;
            }

            constrainPaddle(playerPaddle);
        }

        function updateComputerPaddle() {
            if (computerPaddle.stunned > 0) {
                computerPaddle.stunned--;
                return;
            }

            const computerCenter = computerPaddle.y + paddleHeight / 2;
            const ballCenter = ball.y;

            if (computerCenter < ballCenter - 35) {
                computerPaddle.y += computerPaddle.speed;
            } else if (computerCenter > ballCenter + 35) {
                computerPaddle.y -= computerPaddle.speed;
            }

            constrainPaddle(computerPaddle);
        }

        function updateBall() {
            let speedMultiplier = 1;
            if (ball.slowedDuration > 0) {
                speedMultiplier = 0.4;
                ball.slowedDuration--;
            }

            ball.x += ball.dx * speedMultiplier;
            ball.y += ball.dy * speedMultiplier;

            if (ball.y - ball.size < 0 || ball.y + ball.size > canvas.height) {
                ball.dy = -ball.dy;
                ball.y = Math.max(ball.size, Math.min(canvas.height - ball.size, ball.y));
            }

            if (ball.x - ball.size < 0) {
                computerScore++;
                resetBall();
            }
            if (ball.x + ball.size > canvas.width) {
                playerScore++;
                resetBall();
            }

            if (
                ball.x - ball.size < playerPaddle.x + playerPaddle.width &&
                ball.y > playerPaddle.y &&
                ball.y < playerPaddle.y + playerPaddle.height
            ) {
                if (ball.onFire) {
                    playerPaddle.stunned = 120;
                    disasterInfo.textContent = "🔥 Player hit fire ball! STUNNED for 2 seconds!";
                    ball.onFire = false;
                } else {
                    ball.dx = -ball.dx;
                    ball.x = playerPaddle.x + playerPaddle.width + ball.size;
                    ball.dy += (ball.y - (playerPaddle.y + paddleHeight / 2)) * 0.1;
                }
            }

            if (
                ball.x + ball.size > computerPaddle.x &&
                ball.y > computerPaddle.y &&
                ball.y < computerPaddle.y + computerPaddle.height
            ) {
                if (ball.onFire) {
                    computerPaddle.stunned = 120;
                    disasterInfo.textContent = "🔥 Computer hit fire ball! STUNNED for 2 seconds!";
                    ball.onFire = false;
                } else {
                    ball.dx = -ball.dx;
                    ball.x = computerPaddle.x - ball.size;
                    ball.dy += (ball.y - (computerPaddle.y + paddleHeight / 2)) * 0.1;
                }
            }

            const maxSpeed = 8;
            if (Math.abs(ball.dx) > maxSpeed) {
                ball.dx = (ball.dx / Math.abs(ball.dx)) * maxSpeed;
            }
            if (Math.abs(ball.dy) > maxSpeed) {
                ball.dy = (ball.dy / Math.abs(ball.dy)) * maxSpeed;
            }
        }

        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.dx = (Math.random() > 0.5 ? 1 : -1) * 5;
            ball.dy = (Math.random() - 0.5) * 8;
            ball.onFire = false;

            document.getElementById('playerScore').textContent = playerScore;
            document.getElementById('computerScore').textContent = computerScore;

            disasterInfo.textContent = '';
        }

        class Tornado {
            constructor(x) {
                this.x = x;
                this.y = Math.random() * (canvas.height - 80) + 40;
                this.width = 30;
                this.height = 80;
                this.vx = x < canvas.width / 2 ? 2 : -2;
                this.rotation = 0;
                this.life = 300;
            }

            update() {
                this.x += this.vx;
                this.rotation += 0.3;
                this.life--;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.fillStyle = 'rgba(100, 150, 255, 0.6)';
                ctx.fillRect(-this.width / 2, -this.height / 2, this.width, this.height);
                ctx.restore();
            }

            checkPaddleCollision(paddle) {
                return (
                    this.x > paddle.x - this.width / 2 &&
                    this.x < paddle.x + paddle.width + this.width / 2 &&
                    this.y > paddle.y - this.height / 2 &&
                    this.y < paddle.y + paddle.height + this.height / 2
                );
            }

            checkBallCollision(ball) {
                return (
                    Math.abs(this.x - ball.x) < this.width / 2 + ball.size &&
                    Math.abs(this.y - ball.y) < this.height / 2 + ball.size
                );
            }
        }

        class Fire {
            constructor() {
                this.duration = 200;
                this.active = true;
            }

            update() {
                this.duration--;
                if (this.duration <= 0) {
                    this.active = false;
                    ball.onFire = false;
                }
            }

            draw() {
                if (ball.onFire) {
                    ctx.fillStyle = '#ff6600';
                    ctx.beginPath();
                    ctx.arc(ball.x, ball.y, ball.size + 5, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        class Earthquake {
            constructor() {
                this.duration = 150;
                this.intensity = 1;
            }

            update() {
                this.duration--;
                if (this.duration <= 0) {
                    this.intensity = 0;
                }
            }

            applyShake(paddle) {
                if (this.intensity > 0) {
                    paddle.shaking = Math.sin(this.duration * 0.3) * 15 * this.intensity;
                    paddle.shakingIntensity = this.intensity;
                }
            }
        }

        class Tsunami {
            constructor() {
                this.duration = 240;
            }

            update() {
                this.duration--;
                if (this.duration <= 0) {
                    tsunamiActive = false;
                    tsunamiSlowDuration = 0;
                    disasterInfo.textContent = '🌊 Tsunami passed!';
                }
            }

            draw() {
                ctx.fillStyle = 'rgba(30, 144, 255, 0.3)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.strokeStyle = 'rgba(30, 144, 255, 0.6)';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(canvas.width / 2, canvas.height / 2, 150 - this.duration / 2, 0, Math.PI * 2);
                ctx.stroke();
            }
        }

        let currentEarthquake = null;
        let currentFire = null;
        let currentTsunami = null;

        function spawnDisaster() {
            const rand = Math.random();
            if (rand < 0.25) {
                disasters.push(new Tornado(Math.random() < 0.5 ? 100 : canvas.width - 100));
                disasterInfo.textContent = '🌪️ Tornado incoming!';
            } else if (rand < 0.5) {
                currentEarthquake = new Earthquake();
                disasterInfo.textContent = '🌍 Earthquake strikes!';
            } else if (rand < 0.75) {
                ball.onFire = true;
                currentFire = new Fire();
                disasterInfo.textContent = '🔥 Ball on fire! Avoid it!';
            } else {
                tsunamiActive = true;
                tsunamiSlowDuration = 240;
                currentTsunami = new Tsunami();
                ball.slowedDuration = 240;
                disasterInfo.textContent = '🌊 Tsunami! Everything slows down!';
            }
        }

        function updateDisasters() {
            disasters = disasters.filter(t => t.life > 0);
            disasters.forEach(tornado => {
                tornado.update();

                if (tornado.checkPaddleCollision(playerPaddle)) {
                    playerPaddle.stunned = 120;
                    disasterInfo.textContent = '🌪️ Player hit by tornado! STUNNED!';
                }
                if (tornado.checkPaddleCollision(computerPaddle)) {
                    computerPaddle.stunned = 120;
                    disasterInfo.textContent = '🌪️ Computer hit by tornado! STUNNED!';
                }

                if (tornado.checkBallCollision(ball)) {
                    ball.dx += (Math.random() - 0.5) * 4;
                    ball.dy += (Math.random() - 0.5) * 4;
                }
            });

            if (currentEarthquake) {
                currentEarthquake.update();
                currentEarthquake.applyShake(playerPaddle);
                currentEarthquake.applyShake(computerPaddle);
            }

            if (currentFire) {
                currentFire.update();
            }

            if (currentTsunami) {
                currentTsunami.update();
            }
        }

        function drawPaddle(paddle) {
            ctx.save();
            if (paddle.shaking) {
                ctx.translate(paddle.shaking, 0);
            }
            ctx.fillStyle = paddle.stunned > 0 ? '#ff6600' : '#fff';
            ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);
            ctx.restore();
        }

        function drawBall() {
            ctx.fillStyle = ball.onFire ? '#ff6600' : '#fff';
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.size, 0, Math.PI * 2);
            ctx.fill();

            if (ball.onFire) {
                ctx.strokeStyle = '#ffaa00';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(ball.x, ball.y, ball.size + 3, 0, Math.PI * 2);
                ctx.stroke();
            }
        }

        function drawCenter() {
            ctx.strokeStyle = '#fff';
            ctx.setLineDash([5, 10]);
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drawCenter();
            drawPaddle(playerPaddle);
            drawPaddle(computerPaddle);
            drawBall();

            disasters.forEach(tornado => tornado.draw());
            if (currentFire) currentFire.draw();
            if (currentTsunami) currentTsunami.draw();
        }

        // Skip cutscene function
        function skipCutscene() {
            gameState = GAME_STATE.PLAYING;
            cutsceneTime = 0;
            skipButton.style.display = 'none';
        }

        skipButton.addEventListener('click', skipCutscene);

        let gameFrames = 0;
        function gameLoop() {
            if (gameState === GAME_STATE.CUTSCENE) {
                drawCutscene();
                cutsceneTime++;
                skipButton.style.display = 'block';

                if (cutsceneTime >= 480) {
                    gameState = GAME_STATE.PLAYING;
                    skipButton.style.display = 'none';
                }
            } else {
                updatePlayerPaddle();
                updateComputerPaddle();
                updateBall();
                updateDisasters();

                gameFrames++;
                if (gameFrames % 300 === 0) {
                    spawnDisaster();
                }

                draw();
            }

            requestAnimationFrame(gameLoop);
        }

        // Start game with cutscene
        gameLoop();
    </script>
</body>
</html>
